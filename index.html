<!DOCTYPE html>
<html>
<head>
    <title>Friend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh;
            background: url("img/friend-1.jpg") no-repeat center center/cover;
            background-size: contain;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(255,0,128,0.4));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            color: white;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            padding-bottom: 50px;
        }

        h1 { 
            font-size: 45px; 
            animation: slideDown 2s ease forwards, glow 2s infinite alternate, floatText 3s ease-in-out infinite;
        }
        h2 { font-size: 30px; margin-bottom: 20px; animation: fadeIn 3s ease forwards; }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff4e8a; }
            50% { text-shadow: 0 0 20px #fff, 0 0 35px #ff1f6d; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #ff4e8a; }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #passwordContainer {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            padding: 25px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            animation: fadeIn 2s ease forwards;
        }

        #passwordInput {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 15px;
            border: none;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        #passwordInput::placeholder { color: #fefefe; opacity: 0.7; }
        #passwordInput:focus { background: rgba(255,255,255,0.35); transform: scale(1.05); }

        #submitPassword {
            padding: 12px 35px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg,#ff4e8a,#ff1f6d);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4e8a;
            animation: slow-beat 2.5s infinite;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        #submitPassword:hover {
            transform: scale(1.12) rotate(-1deg);
            box-shadow: 0 0 25px #ff1f6d, 0 0 50px #ff4e8a;
        }

        #errorMessage { color: #ff5555; margin-top: 10px; display: none; font-weight: bold; }

        @keyframes slow-beat { 0%,100% { transform: scale(1); } 30% { transform: scale(1.08); } 60% { transform: scale(1); } }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .heart { 
            position: absolute; 
            color: rgba(255, 255, 255, 0.7); 
            animation: floatUp 6s linear infinite; 
        }

        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

        .sparkle {
            position: absolute;
            font-size: 16px;
            color: #fff;
            opacity: 0.8;
            pointer-events: none;
            animation: sparkleAnim 1.5s linear infinite;
        }
        @keyframes sparkleAnim { 0% { transform: translateY(0) scale(0.5); opacity: 0.8; } 50% { transform: translateY(-15px) scale(1); opacity: 1; } 100% { transform: translateY(0) scale(0.5); opacity: 0; } }

        /* Floating particles background */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: drift 10s linear infinite;
        }
        @keyframes drift {
            from { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0.8; }
            to { transform: translateY(-10vh) translateX(50px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay">
    <h1>Assalam-o-alaikum 🌸</h1>
    <h2>Dear <span id="name">Friend</span></h2>

    <div id="passwordContainer">
        <input type="password" id="passwordInput" placeholder="Enter Password" oninput="createTypingSparkle()">
        <button id="submitPassword" onclick="checkPassword()">Submit</button>
        <div id="errorMessage">Wrong password! Redirecting...</div>
    </div>
</div>

<audio id="bgm" autoplay loop>
    <source src="music/soft-music.mp3" type="audio/mp3">
</audio>

<script>
    const correctPassword = "friend123";

    setTimeout(() => { document.getElementById("overlay").style.opacity = "1"; }, 1000);

    // Hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        const emojis = ["🌸","❤","💖","💗"];
        heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 25 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        heart.style.filter = `drop-shadow(0 0 ${Math.random()*10 + 5}px #ff4e8a)`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 500);

    // Floating particles background
    function createParticles() {
        for(let i=0;i<50;i++){
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random()*window.innerWidth + 'px';
            p.style.top = Math.random()*window.innerHeight + 'px';
            p.style.animationDuration = (Math.random()*8 + 5)+'s';
            document.body.appendChild(p);
            setTimeout(()=>p.remove(), 10000);
        }
    }
    setInterval(createParticles, 2000);

    // Typing sparkles
    function createTypingSparkle() {
        const sparkle = document.createElement("div");
        sparkle.style.position = "absolute";
        const size = Math.random() * 4 + 2;
        sparkle.style.width = sparkle.style.height = size + "px";
        sparkle.style.background = "radial-gradient(circle, rgba(255,255,200,0.8) 0%, rgba(255,220,0,0.3) 70%)";
        sparkle.style.borderRadius = "50%";
        const input = document.getElementById('passwordInput');
        const rect = input.getBoundingClientRect();
        sparkle.style.left = (rect.left + rect.width/2 + (Math.random() * 60 - 30)) + "px";
        sparkle.style.top = (rect.top + rect.height/2 + (Math.random() * 20 - 10)) + "px";
        sparkle.style.pointerEvents = "none";
        sparkle.style.opacity = 1;
        document.body.appendChild(sparkle);

        let x = 0, y = 0, life = 0;
        const angle = Math.random() * 2 * Math.PI;
        const speed = Math.random() * 1.5 + 0.5;

        function animate() {
            x += Math.cos(angle) * speed;
            y += Math.sin(angle) * speed - life * 0.03;
            life += 0.3;
            sparkle.style.transform = `translate(${x}px, ${-y}px)`;
            sparkle.style.opacity = Math.max(1 - life / 50, 0);
            if (life < 50) requestAnimationFrame(animate);
            else sparkle.remove();
        }
        animate();
    }

    // Click sparkles
    document.addEventListener("click", function(e){
        const count = Math.floor(Math.random() * 7 + 8);
        for(let j=0; j<count; j++){
            const sparkle = document.createElement("div");
            sparkle.style.position = "absolute";
            const size = Math.random()*10 + 6;
            sparkle.style.width = sparkle.style.height = size + "px";
            sparkle.style.background = "radial-gradient(circle, rgba(255,255,200,1) 0%, rgba(255,165,0,0.4) 70%)";
            sparkle.style.borderRadius = "50%";
            sparkle.style.left = e.pageX + "px";
            sparkle.style.top = e.pageY + "px";
            sparkle.style.pointerEvents = "none";
            sparkle.style.opacity = 1;
            document.body.appendChild(sparkle);

            let x = 0, y = 0, life = 0;
            const angle = Math.random() * 2 * Math.PI;
            const speed = Math.random() * 4 + 2;

            function animate() {
                x += Math.cos(angle)*speed;
                y += Math.sin(angle)*speed - life*0.05;
                life += 0.5;
                sparkle.style.transform = `translate(${x}px, ${-y}px)`;
                sparkle.style.opacity = Math.max(1 - life/30, 0);
                if(life < 30) requestAnimationFrame(animate);
                else sparkle.remove();
            }
            animate();
        }
    });

    // Typing effect for name
    const nameSpan = document.getElementById("name");
    const fullName = "Fatima";
    let index = 0;
    function typeWriter() {
        if(index <= fullName.length){
            nameSpan.textContent = fullName.substring(0, index);
            index++;
            setTimeout(typeWriter, 150);
        }
    }
    window.onload = typeWriter;

    // Fireworks
    function fireworkEffect(callback){
        const colors = ["#FFD700","#FFA500","#FFFF00","#FFB347","#FFFACD","#FF8C00"];
        const explosions = 20;
        const particlesPerExplosion = 200;

        for(let e=0; e<explosions; e++){
            const startX = Math.random() * window.innerWidth * 0.8 + window.innerWidth*0.1;
            const startY = Math.random() * window.innerHeight * 0.5 + window.innerHeight*0.1;

            for(let i=0; i<particlesPerExplosion; i++){
                const particle = document.createElement("div");
                particle.style.position = "absolute";
                particle.style.left = startX + "px";
                particle.style.top = startY + "px";
                particle.style.width = "5px";
                particle.style.height = "5px";
                particle.style.borderRadius = "50%";
                particle.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                particle.style.pointerEvents = "none";
                particle.style.opacity = 1;
                particle.style.transform = "translate(0,0)";
                document.body.appendChild(particle);

                const angle = Math.random() * 2 * Math.PI;
                const speed = Math.random() * 12 + 4;
                let x = 0, y = 0;
                let life = 0;

                function animate(){
                    x += Math.cos(angle)*speed*0.5;
                    y += Math.sin(angle)*speed*0.5 + life*0.4;
                    life += 0.5;
                    particle.style.transform = `translate(${x}px, ${y}px)`;
                    particle.style.opacity = Math.max(1 - life/25, 0);
                    if(life < 25){
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                }
                animate();
            }
        }
        setTimeout(callback, 1500);
    }

    // Password check
    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("errorMessage");

        if(input === correctPassword){
            fireworkEffect(() => {
                window.location.href = "message.html";
            });
        } else {
            errorMsg.style.display = "block";
            setTimeout(() => { window.location.href = "https://www.google.com"; }, 3000);
        }
    }
</script>
</body>
</html>
