<!DOCTYPE html>
<html>
<head>
    <title>Friend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: url("img/friend-1.jpg") no-repeat center center/cover;
            background-size: contain;  /* makes image fit inside the screen without stretching */
	    overflow: hidden;
        }

        /* Gradient Overlay */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(255,0,128,0.4));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
		justify-content: flex-end; /* aligns content to bottom */
		padding-bottom: 50px; /* space from bottom */

        }

        /* Animated Text */
        h1 {
            font-size: 45px;
            animation: slideDown 2s ease forwards;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 50px;
            animation: fadeIn 3s ease forwards;
        }

        /* Heartbeat Button */
        button {
	    margin-top: 50px; 
            padding: 14px 35px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg,#ff4e8a,#ff1f6d);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 15px #ff4e8a;
            animation: slow-beat 2.5s infinite;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: scale(1.12);
            box-shadow: 0 0 25px #ff1f6d;
        }

        @keyframes slow-beat {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.08); }
            60% { transform: scale(1); }
        }

        /* Animations */
        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.7);
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay">
    <h1>Assalam-o-alaikum 🌸</h1>
    <h2>Dear <span id="name">Fiza Mehtab</span></h2>
    <button onclick="nextPage()"> Start </button>
</div>

<script>
    // Fade in overlay
    setTimeout(() => {
        document.getElementById("overlay").style.opacity = "1";
    }, 1000);

    function nextPage() {
        window.location.href = "message.html";
    }

    // Create floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        const emojis = ["🌸","❤"];
	    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }

    setInterval(createHeart, 500);
</script>

</body>
</html>
