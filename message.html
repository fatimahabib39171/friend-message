<!DOCTYPE html>
<html>
<head>
    <title>Message for Friend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            background: url("img/friend.jpg") no-repeat center center/cover;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        body::before {
            content:"";
            position: absolute;
            width:100%;
            height:100%;
            background: linear-gradient(to bottom right, rgba(255,182,193,0.2), rgba(255,105,180,0.3));
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Envelope wrapper for alignment */
        .envelope-wrapper {
            display: flex;
            width: 100%;
        }

        .envelope-wrapper.left {
            justify-content: flex-start;
        }

        .envelope-wrapper.right {
            justify-content: flex-end;
        }

        /* Envelope */
        .envelope {
            min-width: 250px;
            max-width: 80%;
            background: #ff4e8a;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
            overflow: hidden;
            padding: 10px;
            position: relative;
        }

        .envelope:hover {
            transform: scale(1.05) translateY(-5px);
            background: #ff1f6d;
        }

        /* Flap */
        .envelope::before {
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:50%;
            background:#ff70a6;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 2;
        }

        .envelope.open::before {
            transform: rotateX(180deg);
        }

        /* Message inside envelope */
        .envelope .message {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: all 0.5s ease;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 10px;
        }

        .envelope.open .message {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* Typing text inside envelope */
        .typed-text {
            border-right: 2px solid #ff4e8a;
            white-space: pre-wrap;
            overflow: hidden;
            max-width: 100%;
        }

        /* Floating petals */
        .petal {
            position: absolute;
            font-size: 20px;
            animation: floatPetal 6s linear infinite;
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatPetal {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity:1; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity:0; }
        }

    </style>
</head>
<body>

<div class="container">

    <div class="envelope-wrapper left">
        <div class="envelope" onclick="openMessage(this, 'Hey Friend! 🌸 I just wanted to tell you how amazing it is to have you as a friend.')">
            1
            <div class="message"><span class="typed-text"></span></div>
        </div>
    </div>

    <div class="envelope-wrapper right">
        <div class="envelope" onclick="openMessage(this, 'Your smile lights up every room, and your kindness inspires everyone around you.')">
            2
            <div class="message"><span class="typed-text"></span></div>
        </div>
    </div>

    <div class="envelope-wrapper left">
        <div class="envelope" onclick="openMessage(this, 'Remember all those fun times we shared? They are precious memories I will always cherish. Hope you remember the silly moments too!')">
            3
            <div class="message"><span class="typed-text"></span></div>
        </div>
    </div>

    <div class="envelope-wrapper right">
        <div class="envelope" onclick="openMessage(this, 'I hope this little message brings a smile to your face and reminds you how special you are! 💖')">
            4
            <div class="message"><span class="typed-text"></span></div>
        </div>
    </div>

</div>

<script>
    // Floating petals
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        const petals = ["🌸","🌺","💮","🌼"];
        petal.innerHTML = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.fontSize = (Math.random() * 20 + 15) + 'px';
        petal.style.animationDuration = (Math.random() * 4 + 4) + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 8000);
    }
    setInterval(createPetal, 300);

    // Open envelope and type message
    function openMessage(envelope, text) {
        envelope.classList.toggle('open');
        const span = envelope.querySelector('.typed-text');
        span.textContent = '';

        if (envelope.classList.contains('open')) {
            // Let envelope expand naturally
            let i = 0;
            const typing = setInterval(() => {
                span.textContent += text.charAt(i);
                i++;
                if(i >= text.length) clearInterval(typing);
            }, 30);
        }
    }
</script>

</body>
</html>
